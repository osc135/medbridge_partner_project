[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = ["python -m venv /opt/venv"]

[phases.build]
cmds = [
    "/opt/venv/bin/pip install .",
    "cd frontend && npm install && npm run build",
]

[start]
cmd = "/opt/venv/bin/uvicorn ai_health_coach.api.routes:app --host 0.0.0.0 --port ${PORT:-8000}"
